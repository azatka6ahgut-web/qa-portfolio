version: '3.8'

services:
  db:
    image: postgres:15
    container_name: qa-db
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: qa-api
    environment:
      DATABASE_URL: postgresql://admin:password@db:5432/orders_db
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  postgres_data: